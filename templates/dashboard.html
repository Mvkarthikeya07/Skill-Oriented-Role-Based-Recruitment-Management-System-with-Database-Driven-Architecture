<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - SkillJob</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/dashboard">SkillJob</a>
        <ul class="navbar-nav ms-auto">
            {% if role == 'recruiter' %}
            <li class="nav-item"><a class="nav-link" href="/post_job"><i class="fa fa-plus"></i> Post Job</a></li>
            {% endif %}
            <li class="nav-item"><a class="nav-link" href="/logout">Logout</a></li>
        </ul>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="mb-4">Available Jobs</h2>
    <div class="row">
        {% for job in jobs %}
        <div class="col-md-6">
            <div class="card mb-3 shadow">
                <div class="card-body">
                    <h5 class="card-title">{{ job[1] }}</h5>
                    <p class="card-text">{{ job[2] }}</p>
                    <p class="card-text"><strong>Skills:</strong> {{ job[3] }}</p>
                    {% if role == 'jobseeker' %}
                        {% if job[0] in applied_jobs %}
                            <span class="badge bg-success">Applied</span>
                        {% else %}
                            <a href="/apply/{{ job[0] }}" class="btn btn-primary">Apply</a>
                        {% endif %}
                    {% endif %}
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
